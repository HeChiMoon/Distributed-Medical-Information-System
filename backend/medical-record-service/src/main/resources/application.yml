server:
  port: 9004

spring:
  application:
    name: medical-record-service
  config:
    import: optional:nacos:${spring.application.name}.yml
  datasource:
    url: jdbc:mysql://localhost:3306/dmis_record?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: dmis
    password: dmis123456
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  cloud:
    nacos:
      server-addr: localhost:8848
      discovery:
        namespace:
      config:
        file-extension: yml

management:
  endpoints:
    web:
      exposure:
        include: health,info,refresh

springdoc:
  swagger-ui:
    path: /swagger-ui.html
